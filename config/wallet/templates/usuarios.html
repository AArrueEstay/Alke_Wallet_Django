{% extends 'base.html' %}

{% block content %}

<h2>Usuarios</h2>

<a href="/crear/" class="btn btn-primary mb-3">➕ Crear usuario</a>

<table class="table">
    <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>Acciones</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u.nombre }}</td>
        <td>{{ u.email }}</td>
        <td>
            <a href="/dashboard/{{ u.id }}/" class="btn btn-success btn-sm">Entrar</a>
            <a href="/editar/{{ u.id }}/" class="btn btn-warning btn-sm">Editar</a>
            
            <a href="/eliminar/{{ u.id }}/" 
               class="btn btn-danger btn-sm"
               onclick="return confirmarEliminacion(event)">
               🗑 Eliminar
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<script>
function confirmarEliminacion(event) {
    event.preventDefault();

    let confirmar = confirm("¿Estás seguro de eliminar este usuario?");

    if (confirmar) {
        alert("Usuario eliminado correctamente!");
        window.location.href = event.target.href;
    }

    return false;
}
</script>

{% endblock %}
